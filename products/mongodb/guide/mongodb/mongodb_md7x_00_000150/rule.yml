ocil_clause: 'the configured concurrent connection limit is not restricted'

ocil: |-
    Verify MongoDB enforces a configured maximum for concurrent connections.
    Review the server configuration and runtime settings to ensure a positive,
    bounded value is in effect for total concurrent connections.
