documentation_complete: true

title: 'MongoDB must limit privileges to change software modules, to include stored procedures, functions and triggers, and links to software external to MongoDB.'

description: |-
    If the system were to allow any user to make changes to software libraries, then those changes might be implemented without undergoing the appropriate testing and approvals that are part of a robust change management process.

    Accordingly, only qualified and authorized individuals must be allowed to obtain access to information system components for purposes of initiating changes, including upgrades and modifications.

    Unmanaged changes that occur to the database software libraries or configuration can lead to unauthorized or compromised installations.

rationale: |-
    This rule was migrated from MongoDB STIG standalone development content into product-managed structure.

severity: medium

references:
    stigid@mongodb: MD7X-00-002600
